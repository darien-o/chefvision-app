version: "3.9"

services:
  chefvision:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chefvision-app
    ports:
      - "8501:8501"
    volumes:
      # Persist uploaded PDFs and metadata across container restarts
      - chefvision_data:/app/data
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  chefvision_data:
    driver: local
